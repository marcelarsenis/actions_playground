version: 2

sources:
  - name: raw
    description: Raw event data from upstream system
    tables:
      - name: page_events
        description: One row per page view event
        columns:
          - name: event_id
            description: Unique identifier for the event
          - name: user_id
            description: User who triggered the event
          - name: page_path
            description: |
              Path of the page viewed (e.g., '/products/sku-123').
          - name: occurred_at
            description: |
              When the event occurred (UTC).
              NOTE: Renamed from `event_timestamp` upstream as of 2026-06-22 to
              standardize timestamp column naming across all event sources.
              Some downstream models may still reference the old name.
          - name: _ingested_at
            description: When the row landed in the warehouse
